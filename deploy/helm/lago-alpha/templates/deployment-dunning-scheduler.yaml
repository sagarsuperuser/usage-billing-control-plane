{{- if .Values.dunningScheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lago-alpha.fullname" . }}-dunning-scheduler
  labels:
    {{- include "lago-alpha.labels" . | nindent 4 }}
    app.kubernetes.io/component: dunning-scheduler
spec:
  replicas: {{ .Values.dunningScheduler.replicas }}
  selector:
    matchLabels:
      {{- include "lago-alpha.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dunning-scheduler
  template:
    metadata:
      labels:
        {{- include "lago-alpha.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dunning-scheduler
        {{- with .Values.dunningScheduler.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "lago-alpha.reloaderAnnotations" (dict "root" . "includeDatabase" true) | nindent 8 }}
        {{- with .Values.dunningScheduler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lago-alpha.serviceAccountName.dunningScheduler" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dunning-scheduler
          image: "{{ default .Values.api.image.repository .Values.dunningScheduler.image.repository }}:{{ default .Values.api.image.tag .Values.dunningScheduler.image.tag }}"
          imagePullPolicy: {{ .Values.dunningScheduler.image.pullPolicy }}
          {{- include "lago-alpha.runtimeEnvFrom" . | nindent 10 }}
          env:
            - name: RUN_API_SERVER
              value: "false"
            - name: RUN_REPLAY_WORKER
              value: "false"
            - name: RUN_REPLAY_DISPATCHER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_WORKER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_SCHEDULER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_WORKER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_SCHEDULER
              value: "false"
            - name: RUN_DUNNING_WORKER
              value: "false"
            - name: RUN_DUNNING_SCHEDULER
              value: "true"
          resources:
            {{- toYaml .Values.dunningScheduler.resources | nindent 12 }}
{{- end }}
