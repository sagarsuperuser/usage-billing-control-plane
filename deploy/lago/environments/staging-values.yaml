version: 1.44.0

# Same-cluster staging values for the official Lago chart.
# Lago is an admin surface in this architecture:
# - alpha calls Lago over cluster-internal or restricted admin connectivity
# - Lago API/UI may be browser-reachable for admin use
# - Lago API is not a customer-facing product API
# - if the Lago UI is opened in a browser, `apiUrl` must still be reachable
#   from that same restricted admin path
#
# Keep secrets out of git. DB/Redis values come from the `lago-credentials`
# Kubernetes secret created by `make lago-staging-sync-secrets`.

apiUrl: "https://lago-api-staging.sagarwaidande.org"
frontUrl: "https://lago-staging.sagarwaidande.org"

fullnameOverride: "lago"

postgresql:
  enabled: false

redis:
  enabled: false

minio:
  enabled: false

global:
  existingSecret: "lago-credentials"
  serviceAccountName: "lago-serviceaccount"

  signup:
    enabled: false

  ingress:
    enabled: true
    # These hosts should be restricted admin endpoints, not customer-facing APIs.
    apiHostname: "lago-api-staging.sagarwaidande.org"
    frontHostname: "lago-staging.sagarwaidande.org"
    className: "nginx"
  annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-cloudflare-prod"

  s3:
    enabled: true
    bucket: "lago-staging-uploads-139831607173"
    region: "us-east-1"
    accessKeyId: ""
    secretAccessKey: ""
    useIrsa: true

encryption:
  existingSecret: "lago-encryption"

api:
  replicas: 1
  extraEnv:
    LAGO_ENABLE_ADMIN_BILL_NOW: "true"
  volumes:
    storageClassName: "gp2"
  rails:
    maxThreads: 5
    webConcurrency: 2
  resources:
    requests:
      memory: 512Mi
      cpu: "300m"

front:
  replicas: 2
  resources:
    requests:
      memory: 256Mi
      cpu: "100m"

worker:
  replicas: 1
  rails:
    sidekiqConcurrency: 5
  resources:
    requests:
      memory: 512Mi
      cpu: "250m"

clock:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: "50m"

eventsWorker:
  enabled: true
  replicas: 1
  rails:
    sidekiqConcurrency: 5
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"

clockWorker:
  enabled: true
  replicas: 1
  rails:
    sidekiqConcurrency: 5
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"

billingWorker:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"

paymentWorker:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"

pdfWorker:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"

webhookWorker:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: "150m"
