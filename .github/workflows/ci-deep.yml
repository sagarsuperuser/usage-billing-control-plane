name: CI Deep

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      integration_smoke: ${{ steps.filter.outputs.integration_smoke }}
      integration_full: ${{ steps.filter.outputs.integration_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'web/**'
              - 'internal/api/**'
              - 'internal/service/**'
              - 'internal/appconfig/**'
              - '.github/workflows/ci-deep.yml'
            integration_smoke:
              - 'internal/**'
              - 'cmd/**'
              - 'migrations/**'
              - 'scripts/test_integration.sh'
              - 'scripts/test_real_env_smoke.sh'
              - 'docker-compose*.yml'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci-deep.yml'
            integration_full:
              - 'internal/api/**'
              - 'internal/service/**'
              - 'internal/replay/**'
              - 'internal/dunningflow/**'
              - 'internal/paymentsync/**'
              - 'internal/billingcheck/**'
              - 'internal/billingcycle/**'
              - 'cmd/**'
              - 'migrations/**'
              - 'scripts/test_integration.sh'
              - 'docker-compose*.yml'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci-deep.yml'

  web-ui-e2e:
    name: web-ui-e2e
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright browser suite
        env:
          PLAYWRIGHT_WEB_SERVER_MODE: production
        run: pnpm e2e

  integration-smoke:
    name: integration-smoke
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.integration_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      COMPOSE_FILE: docker-compose.postgres.yml
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:15432/alpha_test?sslmode=disable
      TEST_TEMPORAL_ADDRESS: 127.0.0.1:17233
      TEST_TEMPORAL_NAMESPACE: default
      CLEANUP_ON_EXIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify Docker compose availability
        run: docker compose version

      - name: Governance preflight (informational until owners are configured)
        env:
          ALLOW_CODEOWNERS_PLACEHOLDERS: 1
        run: ./scripts/verify_codeowners.sh

      - name: Run composed integration smoke suite
        run: make test-real-env-smoke

  integration-full:
    name: integration-full
    needs:
      - changes
      - integration-smoke
    if: github.event_name == 'push' || needs.changes.outputs.integration_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      COMPOSE_FILE: docker-compose.postgres.yml
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:15432/alpha_test?sslmode=disable
      TEST_TEMPORAL_ADDRESS: 127.0.0.1:17233
      TEST_TEMPORAL_NAMESPACE: default
      RUN_LARGE_REPLAY_DATASET: 1
      LARGE_REPLAY_EVENT_COUNT: 2000
      LARGE_REPLAY_MAX_MISMATCH_ROWS: 0
      LARGE_REPLAY_MAX_TOTAL_ABS_DELTA_CENTS: 0
      CLEANUP_ON_EXIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify Docker compose availability
        run: docker compose version

      - name: Governance preflight (informational until owners are configured)
        env:
          ALLOW_CODEOWNERS_PLACEHOLDERS: 1
        run: ./scripts/verify_codeowners.sh

      - name: Run full composed integration suite
        run: make test-integration
