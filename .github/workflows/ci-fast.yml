name: CI Fast

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Go test suite
        run: make test

  web-validate:
    name: web-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build UI
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  migration-verify:
    name: migration-verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run migration apply and verify checks
        run: |
          make migrate
          make migrate-verify
          make migrate
          make migrate-verify

      - name: Run migration integration test
        run: go test ./migrations -run TestRunnerAppliesMigrationsIdempotently -v

  infra-validate:
    name: infra-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/terraform/aws

      - name: Terraform init (backend=false)
        run: terraform -chdir=infra/terraform/aws init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/aws validate

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Helm lint
        run: helm lint deploy/helm/lago-alpha

      - name: Helm template staging
        run: |
          helm template lago-alpha deploy/helm/lago-alpha \
            -f deploy/helm/lago-alpha/environments/staging-values.yaml >/tmp/helm-staging.yaml

      - name: Helm template prod
        run: |
          helm template lago-alpha deploy/helm/lago-alpha \
            -f deploy/helm/lago-alpha/environments/prod-values.yaml >/tmp/helm-prod.yaml
