apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lago-alpha.fullname" . }}-api
  labels:
    {{- include "lago-alpha.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "lago-alpha.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "lago-alpha.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "lago-alpha.reloaderAnnotations" (dict "root" . "includeDatabase" true) | nindent 8 }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lago-alpha.serviceAccountName.api" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- include "lago-alpha.runtimeEnvFrom" . | nindent 10 }}
          env:
            - name: RUN_API_SERVER
              value: "true"
            - name: RUN_REPLAY_WORKER
              value: "false"
            - name: RUN_REPLAY_DISPATCHER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_WORKER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_SCHEDULER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_WORKER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_SCHEDULER
              value: "false"
            - name: RUN_DUNNING_WORKER
              value: "false"
            - name: RUN_DUNNING_SCHEDULER
              value: "false"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
