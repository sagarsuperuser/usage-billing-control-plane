name: Real Payment E2E

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      invoice_id:
        description: "Lago invoice id to run retry-payment against (must be finalized and collectible)"
        required: false
        type: string
      prepare_fixture:
        description: "Auto-create a one-off finalized invoice fixture when invoice_id is empty"
        required: false
        default: false
        type: boolean
      fixture_customer_external_id:
        description: "Customer external_id used when prepare_fixture=true"
        required: false
        type: string
      fixture_add_on_code:
        description: "Add-on code for fixture invoice creation"
        required: false
        default: "alpha-real-payment-fixture"
        type: string
      fixture_unit_amount_cents:
        description: "Fixture line-item unit amount cents"
        required: false
        default: "199"
        type: string
      expected_final_status:
        description: "Expected terminal payment status for this invoice"
        required: true
        default: "succeeded"
        type: choice
        options:
          - succeeded
          - failed
      timeout_sec:
        description: "Polling timeout in seconds"
        required: false
        default: "600"
        type: string
      poll_interval_sec:
        description: "Polling interval in seconds"
        required: false
        default: "5"
        type: string

jobs:
  real-payment-e2e:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      ARTIFACT_DIR: artifacts/real-payment-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Validate required secrets
        shell: bash
        env:
          ALPHA_API_BASE_URL: ${{ secrets.ALPHA_API_BASE_URL }}
          ALPHA_WRITER_API_KEY: ${{ secrets.ALPHA_WRITER_API_KEY }}
          ALPHA_READER_API_KEY: ${{ secrets.ALPHA_READER_API_KEY }}
          LAGO_API_URL: ${{ secrets.LAGO_API_URL }}
          LAGO_API_KEY: ${{ secrets.LAGO_API_KEY }}
        run: |
          required=(ALPHA_API_BASE_URL ALPHA_WRITER_API_KEY ALPHA_READER_API_KEY LAGO_API_URL LAGO_API_KEY)
          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required environment secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Resolve invoice id
        id: resolve_invoice
        shell: bash
        env:
          LAGO_API_URL: ${{ secrets.LAGO_API_URL }}
          LAGO_API_KEY: ${{ secrets.LAGO_API_KEY }}
          INPUT_INVOICE_ID: ${{ inputs.invoice_id }}
          PREPARE_FIXTURE: ${{ inputs.prepare_fixture }}
          FIXTURE_CUSTOMER_EXTERNAL_ID: ${{ inputs.fixture_customer_external_id }}
          FIXTURE_ADD_ON_CODE: ${{ inputs.fixture_add_on_code }}
          FIXTURE_UNIT_AMOUNT_CENTS: ${{ inputs.fixture_unit_amount_cents }}
        run: |
          set -euo pipefail
          invoice_id="$(echo "$INPUT_INVOICE_ID" | xargs)"
          if [[ -n "$invoice_id" ]]; then
            jq -n \
              --arg invoice_id "$invoice_id" \
              --arg source "workflow_input" \
              '{invoice_id: $invoice_id, source: $source}' > "$ARTIFACT_DIR/fixture.json"
            echo "invoice_id=$invoice_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PREPARE_FIXTURE" != "true" ]]; then
            echo "invoice_id is required unless prepare_fixture=true" >&2
            exit 1
          fi
          if [[ -z "$(echo "$FIXTURE_CUSTOMER_EXTERNAL_ID" | xargs)" ]]; then
            echo "fixture_customer_external_id is required when prepare_fixture=true" >&2
            exit 1
          fi

          echo "Preparing invoice fixture using customer external id: $FIXTURE_CUSTOMER_EXTERNAL_ID"
          CUSTOMER_EXTERNAL_ID="$FIXTURE_CUSTOMER_EXTERNAL_ID" \
          ADD_ON_CODE="$FIXTURE_ADD_ON_CODE" \
          UNIT_AMOUNT_CENTS="$FIXTURE_UNIT_AMOUNT_CENTS" \
          FINALIZE_INVOICE=1 \
          REQUIRE_STRIPE_BILLING_CONFIG=1 \
          OUTPUT_FILE="$ARTIFACT_DIR/fixture.json" \
          bash ./scripts/prepare_real_payment_invoice_fixture.sh

      - name: Run real payment collection E2E
        env:
          ALPHA_API_BASE_URL: ${{ secrets.ALPHA_API_BASE_URL }}
          ALPHA_WRITER_API_KEY: ${{ secrets.ALPHA_WRITER_API_KEY }}
          ALPHA_READER_API_KEY: ${{ secrets.ALPHA_READER_API_KEY }}
          LAGO_API_URL: ${{ secrets.LAGO_API_URL }}
          LAGO_API_KEY: ${{ secrets.LAGO_API_KEY }}
          INVOICE_ID: ${{ steps.resolve_invoice.outputs.invoice_id }}
          EXPECTED_FINAL_STATUS: ${{ inputs.expected_final_status }}
          TIMEOUT_SEC: ${{ inputs.timeout_sec }}
          POLL_INTERVAL_SEC: ${{ inputs.poll_interval_sec }}
          OUTPUT_FILE: ${{ env.ARTIFACT_DIR }}/result.json
        run: |
          bash ./scripts/test_real_payment_e2e.sh

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "## Real Payment E2E" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected final status: \`${{ inputs.expected_final_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Invoice id: \`${{ steps.resolve_invoice.outputs.invoice_id || 'unknown' }}\`" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f "$ARTIFACT_DIR/result.json" ]]; then
            echo "- Alpha final status: \`$(jq -r '.alpha_final_status' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Lago final status: \`$(jq -r '.lago_final_status' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Lifecycle action: \`$(jq -r '.lifecycle.recommended_action' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Webhook events captured: \`$(jq -r '.event_count' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result artifact not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-payment-e2e-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: warn
