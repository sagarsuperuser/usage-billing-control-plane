name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run test suite
        run: make test

  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: Build UI
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: pnpm e2e

  migration-verify:
    name: migration-verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run migration apply/verify checks
        run: |
          make migrate
          make migrate-verify
          make migrate
          make migrate-verify

      - name: Run migration integration tests
        run: go test ./migrations -run TestRunnerAppliesMigrationsIdempotently -v

  integration-real-env-smoke:
    name: integration-real-env-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      COMPOSE_FILE: docker-compose.postgres.yml
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:15432/lago_alpha_test?sslmode=disable
      TEST_TEMPORAL_ADDRESS: 127.0.0.1:17233
      TEST_TEMPORAL_NAMESPACE: default
      TEST_LAGO_API_KEY: lago_alpha_test_api_key
      BOOTSTRAP_LAGO_FOR_TESTS: 1
      CLEANUP_LAGO_ON_EXIT: 1
      CLEANUP_ON_EXIT: 1

    steps:
      - name: Checkout alpha repo
        uses: actions/checkout@v4

      - name: Checkout Lago backend
        run: git clone --depth 1 https://github.com/getlago/lago.git "$GITHUB_WORKSPACE/lago"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify Docker compose availability
        run: docker compose version

      - name: Governance preflight (informational until owners are configured)
        env:
          ALLOW_CODEOWNERS_PLACEHOLDERS: 1
        run: ./scripts/verify_codeowners.sh

      - name: Run real-env smoke suite
        env:
          LAGO_REPO_PATH: ${{ github.workspace }}/lago
          LAGO_COMPOSE_FILE: docker-compose.yml
        run: make test-real-env-smoke

  integration-temporal:
    name: integration-temporal
    needs:
      - integration-real-env-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_FILE: docker-compose.postgres.yml
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:15432/lago_alpha_test?sslmode=disable
      TEST_TEMPORAL_ADDRESS: 127.0.0.1:17233
      TEST_TEMPORAL_NAMESPACE: default
      TEST_LAGO_API_KEY: lago_alpha_test_api_key
      RUN_LARGE_REPLAY_DATASET: 1
      LARGE_REPLAY_EVENT_COUNT: 2000
      LARGE_REPLAY_MAX_MISMATCH_ROWS: 0
      LARGE_REPLAY_MAX_TOTAL_ABS_DELTA_CENTS: 0
      BOOTSTRAP_LAGO_FOR_TESTS: 1
      CLEANUP_LAGO_ON_EXIT: 1
      CLEANUP_ON_EXIT: 1

    steps:
      - name: Checkout alpha repo
        uses: actions/checkout@v4

      - name: Checkout Lago backend
        run: git clone --depth 1 https://github.com/getlago/lago.git "$GITHUB_WORKSPACE/lago"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify Docker compose availability
        run: docker compose version

      - name: Governance preflight (informational until owners are configured)
        env:
          ALLOW_CODEOWNERS_PLACEHOLDERS: 1
        run: ./scripts/verify_codeowners.sh

      - name: Run real Temporal + Lago integration suite
        env:
          LAGO_REPO_PATH: ${{ github.workspace }}/lago
          LAGO_COMPOSE_FILE: docker-compose.yml
        run: make test-integration
