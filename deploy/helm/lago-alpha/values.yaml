nameOverride: ""
fullnameOverride: ""

reloader:
  enabled: false

serviceAccounts:
  api:
    create: true
    name: ""
    annotations: {}
  billingConnectionCheckWorker:
    create: true
    name: ""
    annotations: {}
  billingConnectionCheckScheduler:
    create: true
    name: ""
    annotations: {}
  paymentReconcileWorker:
    create: true
    name: ""
    annotations: {}
  paymentReconcileScheduler:
    create: true
    name: ""
    annotations: {}
  dunningWorker:
    create: true
    name: ""
    annotations: {}
  dunningScheduler:
    create: true
    name: ""
    annotations: {}
  replayWorker:
    create: true
    name: ""
    annotations: {}
  replayDispatcher:
    create: true
    name: ""
    annotations: {}
  web:
    create: true
    name: ""
    annotations: {}

imagePullSecrets: []

api:
  replicas: 2
  image:
    repository: "" # required in env values
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  podAnnotations: {}
  podLabels: {}

migrations:
  enabled: true
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

replayWorker:
  enabled: true
  replicas: 2
  image:
    repository: "" # required in env values
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi
  podAnnotations: {}
  podLabels: {}

replayDispatcher:
  enabled: true
  replicas: 2
  image:
    repository: "" # required in env values
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  podAnnotations: {}
  podLabels: {}

billingConnectionCheckWorker:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  podAnnotations: {}
  podLabels: {}

billingConnectionCheckScheduler:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}

