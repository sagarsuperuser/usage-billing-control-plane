{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretEnv.secretRefName }}
  labels:
    {{- include "lago-alpha.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.secretEnv.secretRefName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ required "externalSecrets.runtimeSecretName is required when externalSecrets.enabled=true" .Values.externalSecrets.runtimeSecretName | quote }}
{{- if .Values.externalSecrets.database.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.dbSecretEnv.secretRefName }}
  labels:
    {{- include "lago-alpha.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.dbSecretEnv.secretRefName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DB_HOST: {{ required "externalSecrets.database.host is required when externalSecrets.database.enabled=true" .Values.externalSecrets.database.host | quote }}
        DB_PORT: {{ default "5432" .Values.externalSecrets.database.port | quote }}
        DB_NAME: {{ required "externalSecrets.database.name is required when externalSecrets.database.enabled=true" .Values.externalSecrets.database.name | quote }}
        DB_SSLMODE: {{ default "require" .Values.externalSecrets.database.sslmode | quote }}
        DB_USER: "{{ `{{ .db_user }}` }}"
        DB_PASSWORD: "{{ `{{ .db_password }}` }}"
  data:
    - secretKey: db_user
      remoteRef:
        key: {{ required "externalSecrets.database.secretId is required when externalSecrets.database.enabled=true" .Values.externalSecrets.database.secretId | quote }}
        property: {{ default "username" .Values.externalSecrets.database.usernameProperty | quote }}
    - secretKey: db_password
      remoteRef:
        key: {{ required "externalSecrets.database.secretId is required when externalSecrets.database.enabled=true" .Values.externalSecrets.database.secretId | quote }}
        property: {{ default "password" .Values.externalSecrets.database.passwordProperty | quote }}
{{- end }}
{{- end }}
