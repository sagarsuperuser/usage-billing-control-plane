# Copy to staging-values.yaml if you need to customize Temporal staging.
# host/user are injected by scripts/deploy_temporal_staging.sh from the live AWS RDS instance.
serviceAccount:
  create: true

server:
  replicaCount: 1
  config:
    persistence:
      default:
        driver: sql
        sql:
          driver: postgres12
          host: ""
          port: 5432
          database: temporal
          user: ""
          existingSecret: temporal-sql
      visibility:
        driver: sql
        sql:
          driver: postgres12
          host: ""
          port: 5432
          database: temporal_visibility
          user: ""
          existingSecret: temporal-sql
    namespaces:
      create: false

frontend:
  service:
    type: ClusterIP
    port: 7233

web:
  enabled: false

schema:
  createDatabase:
    enabled: true
  setup:
    enabled: true
  update:
    enabled: true

cassandra:
  enabled: false
mysql:
  enabled: false
postgresql:
  enabled: false
elasticsearch:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
