{{- if .Values.billingCycleScheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lago-alpha.fullname" . }}-billing-cycle-scheduler
  labels:
    {{- include "lago-alpha.labels" . | nindent 4 }}
    app.kubernetes.io/component: billing-cycle-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "lago-alpha.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: billing-cycle-scheduler
  template:
    metadata:
      labels:
        {{- include "lago-alpha.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: billing-cycle-scheduler
        {{- with .Values.billingCycleScheduler.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "lago-alpha.reloaderAnnotations" (dict "root" . "includeDatabase" true) | nindent 8 }}
        {{- with .Values.billingCycleScheduler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lago-alpha.serviceAccountName.api" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: billing-cycle-scheduler
          image: "{{ default .Values.api.image.repository .Values.billingCycleScheduler.image.repository }}:{{ default .Values.api.image.tag .Values.billingCycleScheduler.image.tag }}"
          imagePullPolicy: {{ .Values.billingCycleScheduler.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- include "lago-alpha.runtimeEnvFrom" . | nindent 10 }}
          env:
            - name: RUN_API_SERVER
              value: "false"
            - name: RUN_REPLAY_WORKER
              value: "false"
            - name: RUN_REPLAY_DISPATCHER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_WORKER
              value: "false"
            - name: RUN_BILLING_CONNECTION_CHECK_SCHEDULER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_WORKER
              value: "false"
            - name: RUN_PAYMENT_RECONCILE_SCHEDULER
              value: "false"
            - name: RUN_DUNNING_WORKER
              value: "false"
            - name: RUN_DUNNING_SCHEDULER
              value: "false"
            - name: RUN_BILLING_CYCLE_WORKER
              value: "false"
            - name: RUN_BILLING_CYCLE_SCHEDULER
              value: "true"
          resources:
            {{- toYaml .Values.billingCycleScheduler.resources | nindent 12 }}
{{- end }}
