api:
  replicas: 4
  image:
    repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lago-alpha-prod/api"
    tag: "latest"
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 50
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 70

replayWorker:
  enabled: true
  replicas: 6
  image:
    repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lago-alpha-prod/api"
    tag: "latest"

replayDispatcher:
  enabled: true
  replicas: 3
  image:
    repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lago-alpha-prod/api"
    tag: "latest"

web:
  enabled: true
  replicas: 4
  image:
    repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lago-alpha-prod/web"
    tag: "latest"

env:
  APP_ENV: "prod"
  UI_SESSION_COOKIE_SECURE: "true"
  UI_SESSION_COOKIE_SAMESITE: "lax"
  UI_SESSION_REQUIRE_ORIGIN: "true"
  UI_SESSION_ALLOWED_ORIGINS: "https://billing.example.com,https://api.billing.example.com"

serviceAccounts:
  api:
    create: true
    name: "lago-alpha-api"
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/lago-alpha-prod-api-irsa"
  billingConnectionCheckWorker:
    create: true
    name: "lago-alpha-billing-connection-check-worker"
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/lago-alpha-prod-api-irsa"
  billingConnectionCheckScheduler:
    create: true
    name: "lago-alpha-billing-connection-check-scheduler"
    annotations: {}
  paymentReconcileWorker:
    create: true
    name: "lago-alpha-payment-reconcile-worker"
    annotations: {}
  paymentReconcileScheduler:
    create: true
    name: "lago-alpha-payment-reconcile-scheduler"
    annotations: {}
  dunningWorker:
    create: true
    name: "lago-alpha-dunning-worker"
    annotations: {}
  dunningScheduler:
    create: true
    name: "lago-alpha-dunning-scheduler"
    annotations: {}
  replayWorker:
    create: true
    name: "lago-alpha-replay-worker"
    annotations: {}
  replayDispatcher:
    create: true
    name: "lago-alpha-replay-dispatcher"
    annotations: {}
  web:
    create: true
    name: "lago-alpha-web"
    annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare-prod"
  apiHost: "api.billing.example.com"
  webHost: "billing.example.com"
  tls:
    - secretName: lago-alpha-prod-tls
      hosts:
        - api.billing.example.com
        - billing.example.com

secretEnv:
  secretRefName: "lago-alpha-runtime-prod"

externalSecrets:
  enabled: true
  refreshInterval: "1m"
  runtimeSecretName: "lago-alpha/prod/runtime"
  secretStoreRef:
    kind: "ClusterSecretStore"
    name: "aws-secretsmanager"
  createClusterSecretStore: false
