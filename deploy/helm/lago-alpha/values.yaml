  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  podAnnotations: {}
  podLabels: {}

paymentReconcileScheduler:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}

dunningWorker:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  podAnnotations: {}
  podLabels: {}

dunningScheduler:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}

billingCycleWorker:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAnnotations: {}
  podLabels: {}

billingCycleScheduler:
  enabled: false
  replicas: 1
  image:
    repository: "" # defaults to api.image.repository when empty
    tag: "" # defaults to api.image.tag when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}

web:
  enabled: true
  replicas: 2
  apiBaseURL: "" # optional explicit API_BASE_URL override
  image:
    repository: "" # required in env values
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  apiHost: ""
  webHost: ""
  tls: []

env:
  APP_ENV: "staging"
  UI_SESSION_COOKIE_SECURE: "true"
  UI_SESSION_COOKIE_SAMESITE: "lax"
  UI_SESSION_REQUIRE_ORIGIN: "true"
  UI_SESSION_ALLOWED_ORIGINS: ""
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_FAIL_OPEN: "true"
  RATE_LIMIT_LOGIN_FAIL_OPEN: "false"
  RATE_LIMIT_KEY_PREFIX: "lago_alpha:ratelimit"
  RATE_LIMIT_PREAUTH_LOGIN: "20-M"
  RATE_LIMIT_PREAUTH_PROTECTED: "600-M"
  RATE_LIMIT_WEBHOOK: "2400-M"
  RATE_LIMIT_AUTH_READ: "1200-M"
  RATE_LIMIT_AUTH_WRITE: "300-M"
  RATE_LIMIT_AUTH_ADMIN: "120-M"
  RATE_LIMIT_AUTH_INTERNAL: "120-M"
  AUDIT_EXPORTS_ENABLED: "true"
  DB_MAX_OPEN_CONNS: "50"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME_MIN: "30"
  DB_QUERY_TIMEOUT_MS: "5000"
  DB_MIGRATION_TIMEOUT_SEC: "120"
  TEMPORAL_NAMESPACE: "default"
  REPLAY_TEMPORAL_TASK_QUEUE: "alpha-replay-jobs"
  REPLAY_TEMPORAL_DISPATCH_POLL_MS: "750"
  REPLAY_TEMPORAL_DISPATCH_BATCH: "25"
  RUN_PAYMENT_RECONCILE_WORKER: "false"
  RUN_PAYMENT_RECONCILE_SCHEDULER: "false"
  PAYMENT_RECONCILE_TEMPORAL_TASK_QUEUE: "alpha-payment-reconcile"
  PAYMENT_RECONCILE_CRON_SCHEDULE: "@every 2m"
  PAYMENT_RECONCILE_STALE_AFTER_SEC: "300"
  PAYMENT_RECONCILE_BATCH: "100"
  RUN_DUNNING_WORKER: "false"
  RUN_DUNNING_SCHEDULER: "false"
  DUNNING_TEMPORAL_TASK_QUEUE: "alpha-dunning"
  DUNNING_CRON_SCHEDULE: "@every 2m"
  DUNNING_WORKFLOW_ID: "dunning/collect-payment-reminders"
  DUNNING_BATCH: "20"
  DUNNING_TENANT_ID: "default"
  AUDIT_EXPORT_WORKER_POLL_MS: "500"
  AUDIT_EXPORT_DOWNLOAD_TTL_SEC: "86400"
  AUDIT_EXPORT_S3_REGION: "us-east-1"
  AUDIT_EXPORT_S3_FORCE_PATH_STYLE: "false"
  PORT: "8080"

secretEnv:
  # secretRefName must contain these keys after ExternalSecret sync:
  # runtime configuration such as TEMPORAL_ADDRESS, AUDIT_EXPORT_S3_BUCKET, RATE_LIMIT_REDIS_URL
  # optional keys: AUDIT_EXPORT_S3_ENDPOINT
  secretRefName: "lago-alpha-runtime"

dbSecretEnv:
  enabled: false
  # secretRefName should contain DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD, DB_SSLMODE
  secretRefName: "lago-alpha-db"

externalSecrets:
  enabled: true
  refreshInterval: "1m"
  runtimeSecretName: "replace-me" # set to real AWS Secrets Manager secret name per environment
  secretStoreRef:
    kind: "ClusterSecretStore"
    name: "aws-secretsmanager"
  createClusterSecretStore: false
  clusterSecretStore:
    name: "aws-secretsmanager"
    awsRegion: "us-east-1"
    roleArn: ""
    serviceAccountName: "external-secrets"
    serviceAccountNamespace: "external-secrets"
  database:
    enabled: false
    secretId: ""
    usernameProperty: "username"
    passwordProperty: "password"
    host: ""
    port: "5432"
    name: ""
    sslmode: "require"
