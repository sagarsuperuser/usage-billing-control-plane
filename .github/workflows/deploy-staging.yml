name: Deploy Staging

on:
  push:
    branches:
      - main

permissions:
  id-token: write  # required for OIDC role assumption
  contents: read

jobs:
  build-api:
    name: build-api
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/lago-alpha-staging/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    name: build-web
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/lago-alpha-staging/web:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    environment:
      name: staging
      url: https://staging.sagarwaidande.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name lago-alpha-staging-eks

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Write image tag overrides
        run: |
          API_SHA="${{ github.sha }}"
          WEB_SHA="${{ github.sha }}"
          cat > /tmp/image-tags.yaml <<EOF
          api:
            image:
              tag: "${API_SHA}"
          replayWorker:
            image:
              tag: "${API_SHA}"
          replayDispatcher:
            image:
              tag: "${API_SHA}"
          billingConnectionCheckWorker:
            image:
              tag: "${API_SHA}"
          billingConnectionCheckScheduler:
            image:
              tag: "${API_SHA}"
          paymentReconcileWorker:
            image:
              tag: "${API_SHA}"
          paymentReconcileScheduler:
            image:
              tag: "${API_SHA}"
          dunningWorker:
            image:
              tag: "${API_SHA}"
          dunningScheduler:
            image:
              tag: "${API_SHA}"
          billingCycleWorker:
            image:
              tag: "${API_SHA}"
          billingCycleScheduler:
            image:
              tag: "${API_SHA}"
          web:
            image:
              tag: "${WEB_SHA}"
          EOF

      - name: Helm upgrade
        run: |
          helm upgrade lago-alpha deploy/helm/lago-alpha \
            --install \
            --atomic \
            --wait \
            --timeout 10m \
            --namespace lago-alpha \
            --values deploy/helm/lago-alpha/environments/staging-values.yaml \
            --values /tmp/image-tags.yaml

      - name: Deployment summary
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deployed to staging

          | | |
          |---|---|
          | **Commit** | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Triggered by** | ${{ github.actor }} |
          | **Image tag** | \`${{ github.sha }}\` |
          | **URL** | [staging.sagarwaidande.org](https://staging.sagarwaidande.org) |
          EOF
