services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lago_alpha
    ports:
      - "${ALPHA_PG_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./scripts/init_temporal_postgres.sql:/docker-entrypoint-initdb.d/init_temporal_postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=temporal-postgres
      - POSTGRES_DB=temporal
      - VISIBILITY_DB=temporal_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
      - ENABLE_ES=false
    ports:
      - "${ALPHA_TEMPORAL_PORT:-17233}:7233"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "${ALPHA_MINIO_PORT:-19000}:9000"
      - "${ALPHA_MINIO_CONSOLE_PORT:-19001}:9001"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${ALPHA_REDIS_PORT:-16379}:6379"
