name: Staging Runtime Verify

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      invoice_id:
        description: "Optional invoice id for deep status/events/lifecycle checks"
        required: false
        type: string
      rate_limit_probe_attempts:
        description: "Rate-limit probe attempts"
        required: false
        default: "30"
        type: string
      rate_limit_probe_path:
        description: "Rate-limit probe API path"
        required: false
        default: "/v1/meters"
        type: string
      require_lifecycle:
        description: "Require lifecycle endpoint checks"
        required: false
        default: true
        type: boolean

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      ARTIFACT_DIR: artifacts/staging-runtime-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Validate required secrets
        shell: bash
        env:
          ALPHA_API_BASE_URL: ${{ secrets.ALPHA_API_BASE_URL }}
          ALPHA_READER_API_KEY: ${{ secrets.ALPHA_READER_API_KEY }}
        run: |
          required=(ALPHA_API_BASE_URL ALPHA_READER_API_KEY)
          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required environment secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Run runtime verification gate
        env:
          ALPHA_API_BASE_URL: ${{ secrets.ALPHA_API_BASE_URL }}
          ALPHA_READER_API_KEY: ${{ secrets.ALPHA_READER_API_KEY }}
          INVOICE_ID: ${{ inputs.invoice_id }}
          RATE_LIMIT_PROBE_ATTEMPTS: ${{ inputs.rate_limit_probe_attempts }}
          RATE_LIMIT_PROBE_PATH: ${{ inputs.rate_limit_probe_path }}
          REQUIRE_LIFECYCLE: ${{ inputs.require_lifecycle && '1' || '0' }}
          OUTPUT_FILE: ${{ env.ARTIFACT_DIR }}/result.json
        run: |
          bash ./scripts/verify_staging_runtime.sh

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "## Staging Runtime Verify" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ inputs.environment }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Invoice id: \`${{ inputs.invoice_id || 'none' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rate-limit probe path: \`${{ inputs.rate_limit_probe_path }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$ARTIFACT_DIR/result.json" ]]; then
            echo "- Health status: \`$(jq -r '.health_status' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Invoice list count sampled: \`$(jq -r '.invoice_payment_status_list_count' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Attention required count: \`$(jq -r '.summary_attention_required_count' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Rate limiting active: \`$(jq -r '.rate_limit.throttled' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$(jq -r '.invoice != null' "$ARTIFACT_DIR/result.json")" == "true" ]]; then
              echo "- Invoice payment status: \`$(jq -r '.invoice.payment_status' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
              if [[ "$(jq -r '.invoice.lifecycle != null' "$ARTIFACT_DIR/result.json")" == "true" ]]; then
                echo "- Lifecycle action: \`$(jq -r '.invoice.lifecycle.recommended_action' "$ARTIFACT_DIR/result.json")\`" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          else
            echo "- Result artifact not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload runtime verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-runtime-verify-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: warn
