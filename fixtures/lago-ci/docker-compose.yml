volumes:
  alpha_lago_ci_postgres_data:
  alpha_lago_ci_redis_data:
  alpha_lago_ci_storage_data:

x-postgres-image: &postgres-image
  image: getlago/postgres-partman:15.0-alpine

x-redis-image: &redis-image
  image: redis:7-alpine

x-backend-image: &backend-image
  image: ${LAGO_BACKEND_IMAGE_OVERRIDE}

x-backend-environment: &backend-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-lago}:${POSTGRES_PASSWORD:-changeme}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-lago}?search_path=${POSTGRES_SCHEMA:-public}
  REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: ${LAGO_RAILS_STDOUT:-true}
  LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
  LAGO_SIDEKIQ_WEB: ${LAGO_SIDEKIQ_WEB:-true}
  LAGO_ENCRYPTION_PRIMARY_KEY: ${LAGO_ENCRYPTION_PRIMARY_KEY}
  LAGO_ENCRYPTION_DETERMINISTIC_KEY: ${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
  LAGO_ENCRYPTION_KEY_DERIVATION_SALT: ${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
  LAGO_USE_AWS_S3: ${LAGO_USE_AWS_S3:-false}
  LAGO_AWS_S3_ACCESS_KEY_ID: ${LAGO_AWS_S3_ACCESS_KEY_ID:-azerty123456}
  LAGO_AWS_S3_SECRET_ACCESS_KEY: ${LAGO_AWS_S3_SECRET_ACCESS_KEY:-azerty123456}
  LAGO_AWS_S3_REGION: ${LAGO_AWS_S3_REGION:-us-east-1}
  LAGO_AWS_S3_BUCKET: ${LAGO_AWS_S3_BUCKET:-bucket}
  LAGO_AWS_S3_ENDPOINT: ${LAGO_AWS_S3_ENDPOINT:-}
  LAGO_REDIS_CACHE_URL: redis://${LAGO_REDIS_CACHE_HOST:-redis}:${LAGO_REDIS_CACHE_PORT:-6379}
  LAGO_REDIS_CACHE_PASSWORD: ${LAGO_REDIS_CACHE_PASSWORD:-}
  LAGO_DISABLE_SEGMENT: ${LAGO_DISABLE_SEGMENT:-true}
  LAGO_DISABLE_WALLET_REFRESH: ${LAGO_DISABLE_WALLET_REFRESH:-true}
  LAGO_DISABLE_SIGNUP: ${LAGO_DISABLE_SIGNUP:-true}
  LAGO_DISABLE_PDF_GENERATION: ${LAGO_DISABLE_PDF_GENERATION:-true}
  LAGO_OAUTH_PROXY_URL: ${LAGO_OAUTH_PROXY_URL:-https://proxy.getlago.com}
  LAGO_CREATE_ORG: ${LAGO_CREATE_ORG:-false}
  LAGO_ORG_USER_PASSWORD: ${LAGO_ORG_USER_PASSWORD:-}
  LAGO_ORG_USER_EMAIL: ${LAGO_ORG_USER_EMAIL:-}
  LAGO_ORG_NAME: ${LAGO_ORG_NAME:-}
  LAGO_ORG_API_KEY: ${LAGO_ORG_API_KEY:-}

services:
  db:
    <<: *postgres-image
    container_name: alpha-lago-ci-db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lago} -d ${POSTGRES_DB:-lago} -h localhost -p ${POSTGRES_PORT:-5432}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lago}
      POSTGRES_USER: ${POSTGRES_USER:-lago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /data/postgres
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SCHEMA: public
    volumes:
      - alpha_lago_ci_postgres_data:/data/postgres
    ports:
      - ${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}

  redis:
    <<: *redis-image
    container_name: alpha-lago-ci-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --port ${REDIS_PORT:-6379}
    volumes:
      - alpha_lago_ci_redis_data:/data
    ports:
      - ${REDIS_PORT:-6379}:${REDIS_PORT:-6379}

  migrate:
    <<: *backend-image
    container_name: alpha-lago-ci-migrate
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: ["./scripts/migrate.sh"]
    environment:
      <<: *backend-env

  api:
    <<: *backend-image
    container_name: alpha-lago-ci-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.api.sh"]
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 10s
      start_period: 30s
      timeout: 60s
      start_interval: 2s
    environment:
      <<: *backend-env
      LAGO_API_URL: ${LAGO_API_URL:-http://localhost:3000}
      LAGO_FRONT_URL: ${LAGO_FRONT_URL:-http://localhost}
    volumes:
      - alpha_lago_ci_storage_data:/app/storage
    ports:
      - ${API_PORT:-3000}:3000

  api-worker:
    <<: *backend-image
    container_name: alpha-lago-ci-worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.worker.sh"]
    healthcheck:
      test: curl -f http://localhost:8080 || exit 1
      interval: 10s
      start_period: 30s
      timeout: 60s
      start_interval: 2s
    environment:
      <<: *backend-env
      LAGO_API_URL: ${LAGO_API_URL:-http://localhost:3000}
    volumes:
      - alpha_lago_ci_storage_data:/app/storage

  api-clock:
    <<: *backend-image
    container_name: alpha-lago-ci-clock
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.clock.sh"]
    environment:
      <<: *backend-env
      LAGO_API_URL: ${LAGO_API_URL:-http://localhost:3000}
